<!DOCTYPE html>
<html>
<head>
  <title>Hanuman Janmotsav Pooja Booking</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial;
      background: #fff5e6;
      text-align: center;
      margin: 0;
    }

    header {
      background: #ff6600;
      color: white;
      padding: 15px;
      font-size: 24px;
    }

    /* Logo Style */
    .logo {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      margin-bottom: 10px;
      background: white;
      padding: 5px;
    }

    .header-img {
      width: 100%;
      height: 350px;
      object-fit: cover;
    }

    .container {
      padding: 20px;
    }

    .pooja {
      background: white;
      margin: 15px;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px #ddd;
    }

    .price {
      color: #cc0000;
      font-weight: bold;
      font-size: 32px;
      margin-top: 10px;
    }

    .btn {
      background: #ff6600;
      color: white;
      padding: 12px 20px;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }

    .payment {
      background: #fff;
      padding: 15px;
      margin: 20px;
      border-radius: 10px;
    }
