<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>
// EXISTING FUNCTIONS SAME
function changeImage(el){
    const main = el.closest('.card').querySelector('.active-img');
    main.src = el.src;
}

document.getElementById("searchBox").addEventListener("keyup", function(){
    let filter = this.value.toLowerCase();
    let cards = document.querySelectorAll(".card");

    cards.forEach(card=>{
        let text = card.innerText.toLowerCase();
        card.style.display = text.includes(filter) ? "" : "none";
    });
});

function changeQty(btn, change){
    let qtyEl = btn.parentElement.querySelector(".qty");
    let qty = parseInt(qtyEl.innerText);
    qty = Math.max(1, qty + change);
    qtyEl.innerText = qty;
}

function orderWhatsApp(btn, e){
    e.preventDefault();

    let card = btn.closest(".card");
    let name = card.querySelector("h3").innerText;
    let price = card.querySelector(".price").innerText;
    let qty = card.querySelector(".qty").innerText;

    let message = `Hello, I want to order:\n\n${name}\nPrice: ${price}\nQuantity: ${qty}`;
    let url = `https://wa.me/919347184217?text=${encodeURIComponent(message)}`;

    window.open(url, "_blank");
}

// ✅ NEW FEATURE ONLY (MODIFIED FOR RAZORPAY)
let selectedProduct="", selectedPrice="", selectedQty="";

function openCheckout(btn){
    let card = btn.closest(".card");
    selectedProduct = card.querySelector("h3").innerText;
    selectedPrice = card.querySelector(".price").innerText;
    selectedQty = card.querySelector(".qty").innerText;

    document.getElementById("checkoutBox").style.display = "flex";
}

function closeCheckout(){
    document.getElementById("checkoutBox").style.display = "none";
}

// 🔥 REPLACED FUNCTION (ONLY CHANGE)
function payNow(){

    let name = document.getElementById("c_name").value;
    let phone = document.getElementById("c_phone").value;
    let address = document.getElementById("c_address").value;

    if(!name || !phone || !address){
        alert("Please fill all details");
        return;
    }

    let price = selectedPrice.replace("₹","");
    let qty = selectedQty;
    let total = parseInt(price) * parseInt(qty);

    let options = {
        "key": "YOUR_KEY_ID", // 🔴 replace with your Razorpay key
        "amount": total * 100,
        "currency": "INR",
        "name": "Pendyala Divine Services",
        "description": selectedProduct,

        "prefill": {
            "name": name,
            "contact": phone
        },

        "notes": {
            "address": address,
            "product": selectedProduct,
            "quantity": qty
        },

        "theme": {
            "color": "#ff6600"
        },

        "handler": function (response){
            alert("Payment Successful! ID: " + response.razorpay_payment_id);
            closeCheckout();
        }
    };

    let rzp = new Razorpay(options);
    rzp.open();
}
</script>
